/* ─── MATH ─────────────────────────────── */
function red(n){while(n>9)n=String(n).split("").reduce((a,b)=>a+parseInt(b),0);return n;}

function calcVars(day,month,cent,yr){
  const A=red(day),B=red(month),C=red(A+B);
  const D=red(cent),E=red(yr),F=red(D+E);
  const G=red(C+F),H=red(C+G),I=red(F+G),J=red(I+H);
  const K=red(A+C),L=red(B+C),M=red(K+L);
  const N=red(D+F),O=red(E+F),P=red(N+O);
  return {A,B,C,D,E,F,G,H,I,J,K,L,M,N,O,P};
}

// Hidden subconscious: double each of C,F,G separately, reduce any 2-digit result.
// e.g. C=2,F=1,G=3 -> 4,2,6 ; C=7,F=6,G=8 -> 14→5, 12→3, 16→7 -> 5,3,7
function hiddenDigits(C,F,G){
  return [C,F,G].map(d=>red(d*2));
}

function getMissing(v){
  const agNums=[v.A,v.B,v.C,v.D,v.E,v.F,v.G];
  return [1,2,3,4,5,6,7,8,9].filter(n=>!agNums.includes(n));
}

function countEls(v){
  const ct={金:0,水:0,火:0,木:0,土:0};
  Object.values(v).forEach(n=>{if(EL_MAP[n])ct[EL_MAP[n]]++;});
  return ct;
}

function getFiveBoxes(mainEl,v){
  const start=GEN_ORD.indexOf(mainEl);
  const order=start<0?GEN_ORD:[...GEN_ORD.slice(start),...GEN_ORD.slice(0,start)];
  const all=Object.values(v);
  return order.map(el=>({el,count:all.filter(n=>EL_MAP[n]===el).length}));
}

function boxState(count,bench,hasZero){
  if(count===0&&hasZero)return "zero";
  if(count<bench)return "low";
  if(count>bench)return "high";
  return "ideal";
}

function dateNum(d){ // reduce a full date to 1-9
  const s=`${d.getFullYear()}${d.getMonth()+1}${d.getDate()}`;
  return red(s.split("").reduce((a,b)=>a+parseInt(b),0));
}
function yearNum(y){ return red(String(y).split("").reduce((a,b)=>a+parseInt(b),0)); }

function getDailyFortune(G){
  const today=new Date();
  const dn=dateNum(today);
  const combined=red(dn+G); // user core × today
  return {num:combined, dateStr:`${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,"0")}/${String(today.getDate()).padStart(2,"0")}`, dayNum:dn, ...FORTUNE[combined]};
}
function getYearFortune(G,year){
  const yn=yearNum(year);
  const combined=red(yn+G);
  return {num:combined, year, yearNum:yn, ...FORTUNE[combined]};
}

function comboReading(group){
  const nums=group.nums;
  const key=nums.join("");
  const sp=SPECIAL_COMBOS[key];
  if(sp)return {headline:sp.h, body:sp.b, warn:sp.w||null, special:true};
  // woven fallback — lead digit dominant, no digits shown
  const [a,b,c]=nums;
  const open=AREA_OPEN[group.id]||"在这方面";
  const uniq=[...new Set(nums)];
  let body=`${open}，你以「${DIGIT_ROLE[a]?.name}」的特质为主轴——${DIGIT_ROLE[a]?.trait}`;
  if(b!==a||c!==a){
    const sup=[b,c].filter(n=>n!==a).map(n=>DIGIT_ROLE[n]?.trait);
    if(sup.length)body+=`，再揉合${sup.join("、")}的力量`;
  }
  body+="。";
  if(uniq.length===1)body+="这股特质在你身上汇聚成极强的力量，近乎极致。";
  else if(nums.length-uniq.length===1)body+="其中有一股力量重复出现，在你身上会被明显放大。";
  return {headline:`${DIGIT_ROLE[a]?.name}主导 · 三才交织`, body, warn:null, special:false};
}

  const[step,setStep]=useState(0);
  const ready=f.day&&f.month&&f.cent&&f.yr;

  function go(){
    if(!ready)return;
    setLoading(true);setStep(0);
    let s=0;
    const iv=setInterval(()=>{s++;setStep(s);
      if(s>=STEPS.length){clearInterval(iv);
        setTimeout(()=>{
          const vars=calcVars(+f.day,+f.month,+f.cent,+f.yr);
          onResult({vars,groups:makeGroups(vars),missing:getMissing(vars)});
          setLoading(false);
        },300);
      }
    },600);
  }

  const iS={background:"#1a1510",border:`1px solid ${T.borderG}`,borderRadius:10,
    color:T.text,fontSize:20,fontWeight:700,padding:"14px 8px",
    width:"100%",outline:"none",fontFamily:"Georgia,serif",textAlign:"center"};

  return(
    <div style={{minHeight:"100vh",background:T.bg,padding:"36px 20px",
      fontFamily:"'Noto Serif SC',serif",maxWidth:430,margin:"0 auto"}}>
      <style>{FONT_CSS}</style>
      <button onClick={onBack} style={{background:"none",border:"none",
        color:T.textDim,cursor:"pointer",fontSize:12,marginBottom:28,padding:0}}>← 返回</button>
      <h2 style={{color:T.text,fontSize:22,fontWeight:300,letterSpacing:2,marginBottom:24}}>输入生日</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:24}}>
        {[["日 Date","day","DD"],["月 Month","month","MM"],["世纪 Century","cent","CC"],["年 Year","yr","YY"]].map(([lbl,k,ph])=>(
          <div key={k}>
            <label style={{color:T.textDim,fontSize:9,display:"block",marginBottom:6}}>{lbl}</label>
            <input style={iS} type="number" value={f[k]}
              onChange={e=>setF(p=>({...p,[k]:e.target.value}))} placeholder={ph}/>
          </div>
        ))}
      </div>
      <div style={{marginBottom:24,padding:"10px 14px",borderRadius:10,background:T.card,border:`1px solid ${T.borderG}`}}>
        <div style={{color:T.textDim,fontSize:10}}>例：16/04/1981 → 日=16 月=04 世纪=19 年=81</div>
      </div>
      {loading?(
        <div style={{textAlign:"center",padding:32}}>
          <div style={{fontSize:36,display:"inline-block",animation:"spin 3s linear infinite"}}>☯</div>
          <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
          <div style={{color:T.gold,fontSize:13,letterSpacing:2,marginTop:14}}>
            {STEPS[Math.min(step,STEPS.length-1)]}</div>
        </div>
      ):(
        <button onClick={go} style={{width:"100%",padding:"17px",borderRadius:12,
          background:ready?`linear-gradient(135deg,${T.goldDk},${T.gold})`:T.card,
          border:`1px solid ${ready?T.gold:T.border}`,
          cursor:ready?"pointer":"not-allowed",fontSize:15,fontWeight:700,
          color:ready?"#0a0700":T.textDim,letterSpacing:2,
          fontFamily:"'Noto Serif SC',serif"}}>生成命理报告</button>
      )}
    </div>
  );
}

function Gauge({value,color}){
  const r=34, circ=2*Math.PI*r, off=circ*(1-value/100);
  return(
    <svg width="84" height="84" viewBox="0 0 84 84">
      <circle cx="42" cy="42" r={r} fill="none" stroke="#2a2015" strokeWidth="6"/>
      <circle cx="42" cy="42" r={r} fill="none" stroke={color} strokeWidth="6"
        strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"
        transform="rotate(-90 42 42)"/>
      <text x="42" y="40" textAnchor="middle" fill={color} fontSize="22"
        fontFamily="Georgia,serif" fontWeight="700">{value}</text>
      <text x="42" y="56" textAnchor="middle" fill="#8a7a60" fontSize="9">运势</text>
    </svg>
  );
}

                  即将推出 · 敬请期待</div>
              </div>
            )}
          </div>
        )}

        {/* Tab 4: 13 Groups */}
        {tab===4&&(
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
              marginBottom:12,padding:"10px 14px",borderRadius:10,
              background:T.card,border:`1px solid ${T.borderG}`}}>
              <div>
                <div style={{color:T.text,fontSize:12}}>{paid?"完整版 · 全13组":"免费版 · 前3组"}</div>
                <div style={{color:T.textDim,fontSize:10}}>解锁全部命理组合</div>
              </div>
              {!paid&&(
                <button onClick={()=>setShowPaywall(true)} style={{
                  padding:"7px 14px",borderRadius:8,fontSize:11,fontWeight:700,
                  background:`linear-gradient(135deg,${T.goldDk},${T.gold})`,
                  border:"none",cursor:"pointer",color:"#0a0700"}}>
                  解锁全部</button>
              )}
            </div>
            <div style={{color:T.textSub,fontSize:11,marginBottom:12,textAlign:"center",letterSpacing:1}}>
              13 组合解读 / 13 Combinations Reading</div>
            {groups.map((g,i)=>(
              <div key={g.id} onClick={()=>{if(!paid&&i>=3)setShowPaywall(true);}}>
                <GroupCard group={g} idx={i} show={show} locked={!paid&&i>=3}/>
              </div>
            ))}
            {!paid&&(
              <div style={{margin:"20px 0",padding:22,borderRadius:16,textAlign:"center",
                background:`linear-gradient(135deg,#1a1208,#0f0c05)`,border:`1px solid ${T.gold}55`}}>
                <div style={{color:T.goldLt,fontSize:17,fontWeight:600,marginBottom:8}}>还有 10 组深度解读</div>
                <div style={{color:T.textDim,fontSize:12,marginBottom:18,lineHeight:1.7}}>
                  事业旅程 · 婚姻走向 · 财富密码<br/>隐藏潜意识 · 亲情贵人</div>
                <div style={{color:"#c9a84c",fontSize:13,fontWeight:600,letterSpacing:1,marginBottom:18}}>即将推出 · 敬请期待</div>
                <button onClick={()=>setShowPaywall(true)} style={{
                  width:"100%",padding:15,borderRadius:11,
                  background:`linear-gradient(135deg,${T.goldDk},${T.gold},${T.goldLt})`,
                  border:"none",cursor:"pointer",fontSize:15,fontWeight:700,
                  color:"#0a0700",fontFamily:"'Noto Serif SC',serif",
                  boxShadow:`0 4px 20px ${T.goldGl}`}}>一次解锁 · 查看完整命盘</button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Paywall modal */}
      {showPaywall&&(
        <Paywall onClose={()=>setShowPaywall(false)}
          onSubscribe={()=>{setPaid(true);setShowPaywall(false);}}/>
      )}
    </div>
  );
}

/* ══ ROOT ══ */
function App(){
  const[page,setPage]=useState("home");
  const[report,setReport]=useState(null);
  if(page==="home") return (<HomePage onStart={()=>setPage("input")}/>);
  if(page==="input") return (<InputPage onBack={()=>setPage("home")}
    onResult={r=>{setReport(r);setPage("report");}}/>);
  if(page==="report") return (<ReportPage data={report} onBack={()=>setPage("input")}/>);
  return null;
}

// Mount the app
const rootEl = document.getElementById("root");
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(App));

  </script>
</body>
