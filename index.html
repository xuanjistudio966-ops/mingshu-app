const { useState, useEffect, useRef } = React;

const Entitlement = (() => {
  let paid = false;
  const subs = new Set();
  return {
    get: () => paid,
    set: (v) => { v = !!v; if (v === paid) return; paid = v; subs.forEach(fn => { try { fn(paid); } catch (e) {} }); },
    subscribe: (fn) => { subs.add(fn); return () => subs.delete(fn); },
  };
})();
window.MingShuApplyEntitlement = (v) => Entitlement.set(v);
if (window.AndroidBilling && typeof window.AndroidBilling.ready === "function") { try { window.AndroidBilling.ready(); } catch (e) {} }
function usePaid() {
  const [paid, setPaidState] = useState(Entitlement.get());
  useEffect(() => Entitlement.subscribe(setPaidState), []);
  return paid;
}
function requestPurchase(fallback) {
  const bridge = window.AndroidBilling;
  if (bridge && typeof bridge.purchase === "function") { try { bridge.purchase(); return; } catch (e) {} }
  if (fallback) fallback();
}

/* ─── MATH ─────────────────────────────── */
function red(n){while(n>9)n=String(n).split("").reduce((a,b)=>a+parseInt(b),0);return n;}

function calcVars(day,month,cent,yr){
  const A=red(day),B=red(month),C=red(A+B);
  const D=red(cent),E=red(yr),F=red(D+E);
  const G=red(C+F),H=red(C+G),I=red(F+G),J=red(I+H);
  const K=red(A+C),L=red(B+C),M=red(K+L);
  const N=red(D+F),O=red(E+F),P=red(N+O);
  return {A,B,C,D,E,F,G,H,I,J,K,L,M,N,O,P};
}

// Hidden subconscious: double each of C,F,G separately, reduce any 2-digit result.
// e.g. C=2,F=1,G=3 -> 4,2,6 ; C=7,F=6,G=8 -> 14→5, 12→3, 16→7 -> 5,3,7
function hiddenDigits(C,F,G){
  return [C,F,G].map(d=>red(d*2));
}

function getMissing(v){
  const agNums=[v.A,v.B,v.C,v.D,v.E,v.F,v.G];
  return [1,2,3,4,5,6,7,8,9].filter(n=>!agNums.includes(n));
}

function countEls(v){
  const ct={金:0,水:0,火:0,木:0,土:0};
  Object.values(v).forEach(n=>{if(EL_MAP[n])ct[EL_MAP[n]]++;});
  return ct;
}

function getFiveBoxes(mainEl,v){
  const start=GEN_ORD.indexOf(mainEl);
  const order=start<0?GEN_ORD:[...GEN_ORD.slice(start),...GEN_ORD.slice(0,start)];
  const all=Object.values(v);
  return order.map(el=>({el,count:all.filter(n=>EL_MAP[n]===el).length}));
}

function dateNum(d){ // reduce a full date to 1-9
  const s=`${d.getFullYear()}${d.getMonth()+1}${d.getDate()}`;
  return red(s.split("").reduce((a,b)=>a+parseInt(b),0));
}
function yearNum(y){ return red(String(y).split("").reduce((a,b)=>a+parseInt(b),0)); }

function getDailyFortune(birthDay,birthMonth){
  const today=new Date();
  const todayDate=today.getDate();
  const todayMonth=today.getMonth()+1;
  const todayCent=20;
  const todayYr=today.getFullYear()%100;
  const A=red(todayDate+birthDay);
  const B=red(todayMonth+birthMonth);
  const D=red(todayCent);
  const E=red(todayYr);
  const C=red(A+B);
  const F=red(D+E);
  const G=red(C+F);
  const dateStr=`${today.getFullYear()}/${String(todayMonth).padStart(2,"0")}/${String(todayDate).padStart(2,"0")}`;
  return {num:G, dateStr, ...FORTUNE[G]};
}
function getYearFortune(birthDay,birthMonth,year){
  const A=red(birthDay);
  const B=red(birthMonth);
  const D=red(20);
  const E=red(year%100);
  const C=red(A+B);
  const F=red(D+E);
  const G=red(C+F);
  return {num:G, year, ...YEAR_FORTUNE[G]};
}

function comboReading(group){
  const nums=group.nums;
  const key=nums.join("");
  const sp=SPECIAL_COMBOS[key];
  if(sp)return {headline:sp.h, body:sp.b, warn:sp.w||null, special:true};
  // woven fallback — lead digit dominant, no digits shown
  const [a,b,c]=nums;
  const open=AREA_OPEN[group.id]||"在这方面";
  const uniq=[...new Set(nums)];
  let body=`${open}，你以「${DIGIT_ROLE[a]?.name}」的特质为主轴——${DIGIT_ROLE[a]?.trait}`;
  if(b!==a||c!==a){
    const sup=[b,c].filter(n=>n!==a).map(n=>DIGIT_ROLE[n]?.trait);
    if(sup.length)body+=`，再揉合${sup.join("、")}的力量`;
  }
  body+="。";
  if(uniq.length===1)body+="这股特质在你身上汇聚成极强的力量，近乎极致。";
  else if(nums.length-uniq.length===1)body+="其中有一股力量重复出现，在你身上会被明显放大。";
  return {headline:`${DIGIT_ROLE[a]?.name}主导 · 三才交织`, body, warn:null, special:false};
}

const STEPS=["解析生命数字...","对照易经矩阵...","计算13组合...","生成命理报告..."];

function InputPage({onBack,onResult}){
  const[f,setF]=useState({day:"",month:"",cent:"",yr:""});
  const[loading,setLoading]=useState(false);
  const[step,setStep]=useState(0);
  const[err,setErr]=useState("");
  const filled=f.day&&f.month&&f.cent&&f.yr;

  function validate(){
    const d=+f.day,m=+f.month,c=+f.cent,y=+f.yr;
    if(!f.day||d<1||d>31)return"日期无效，请输入 1–31 之间的日期";
    if(!f.month||m<1||m>12)return"月份无效，请输入 1–12 之间的月份";
    if(c!==19&&c!==20)return"世纪无效，请输入 19 或 20";
    if(f.yr===""||y<0||y>99)return"年份无效，请输入 00–99 之间的两位年份";
    return"";
  }

  function go(){
    const e=validate();
    if(e){setErr(e);return;}
    setErr("");
    setLoading(true);setStep(0);
    let s=0;
    const iv=setInterval(()=>{s++;setStep(s);
      if(s>=STEPS.length){clearInterval(iv);
        setTimeout(()=>{
          const vars=calcVars(+f.day,+f.month,+f.cent,+f.yr);
          onResult({vars,groups:makeGroups(vars),missing:getMissing(vars),birthDay:+f.day,birthMonth:+f.month,birthCent:+f.cent,birthYr:+f.yr});
          setLoading(false);
        },300);
      }
    },600);
  }

  const iS={background:"#1a1510",border:`1px solid ${T.borderG}`,borderRadius:10,
    color:T.text,fontSize:20,fontWeight:700,padding:"14px 8px",
    width:"100%",outline:"none",fontFamily:"Georgia,serif",textAlign:"center"};

  return(
    <div style={{minHeight:"100vh",background:T.bg,padding:"36px 20px",
      fontFamily:"'Noto Serif SC',serif",maxWidth:430,margin:"0 auto"}}>
      <style>{FONT_CSS}</style>

        color:T.textDim,cursor:"pointer",fontSize:12,marginBottom:28,padding:0}}>← 返回</button>
      <h2 style={{color:T.text,fontSize:22,fontWeight:300,letterSpacing:2,marginBottom:8}}>输入生日</h2>

        源自易经的生命数字系统，透过生日解读你的性格、事业与婚姻
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:24}}>
        {[["日 Date","day","DD"],["月 Month","month","MM"],["世纪 Century","cent","CC"],["年 Year","yr","YY"]].map(([lbl,k,ph])=>(
          <div key={k}>
            <label style={{color:T.textDim,fontSize:9,display:"block",marginBottom:6}}>{lbl}</label>
            <input style={iS} type="number" value={f[k]}
              onChange={e=>setF(p=>({...p,[k]:e.target.value}))} placeholder={ph}/>
          </div>
        ))}
      </div>
      <div style={{marginBottom:24,padding:"10px 14px",borderRadius:10,background:T.card,border:`1px solid ${T.borderG}`}}>
        <div style={{color:T.textDim,fontSize:10}}>例：12/02/1965 → 日=12 月=02 世纪=19 年=65</div>
      </div>
      {err&&(
        <div style={{marginBottom:16,padding:"10px 14px",borderRadius:10,
          background:`${T.red}18`,border:`1px solid ${T.red}55`,
          color:T.red,fontSize:12,textAlign:"center"}}>

      )}

        <div style={{textAlign:"center",padding:32}}>

          <div style={{color:T.gold,fontSize:13,letterSpacing:2,marginTop:14}}>

        <button onClick={go} style={{width:"100%",padding:"17px",borderRadius:12,
          background:filled?`linear-gradient(135deg,${T.goldDk},${T.gold})`:T.card,
          border:`1px solid ${filled?T.gold:T.border}`,

          fontFamily:"'Noto Serif SC',serif"}}>生成命理报告</button>
      )}
    </div>
  );
}

function App(){

  if(page==="input") return (<InputPage onBack={()=>setPage("home")}
    onResult={r=>{setReport(r);setPage("report");}}/>);
  if(page==="report") return (<ReportPage data={report} onBack={()=>setPage("input")}/>);
  return null;
}

root.render(React.createElement(App));
